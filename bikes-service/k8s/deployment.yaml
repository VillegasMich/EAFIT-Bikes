apiVersion: apps/v1
kind: Deployment
metadata:
  name: bikes-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bikes
  template:
    metadata:
      labels:
        app: bikes
    spec:
      containers:
        - name: bikes
          image: bikes-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bikes-secret
                  key: DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: bikes-secret
                  key: RABBITMQ_URL