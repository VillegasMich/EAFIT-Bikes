apiVersion: apps/v1
kind: Deployment
metadata:
  name: geo-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: geolocalization
  template:
    metadata:
      labels:
        app: geolocalization
    spec:
      containers:
        - name: geolocalization
          image: geolocalization:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: geo-secret
                  key: DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: geo-secret
                  key: RABBITMQ_URL
            - name: APP_PORT
              valueFrom:
                configMapKeyRef:
                  name: geo-config
                  key: APP_PORT
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: geo-config
                  key: RUST_LOG
