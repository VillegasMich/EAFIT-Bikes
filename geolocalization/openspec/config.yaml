schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
rules:
  tasks:
    - Always include a final task to update documentation. This task must review
      whether the change affects any API endpoints, request/response shapes,
      status codes, validation rules, environment variables, or architectural
      decisions, and update README.md and CLAUDE.md accordingly.
    - If the change adds or modifies an API endpoint, include a task to create
      or update the corresponding documentation file in docs/. Each endpoint
      must have its own Markdown file (e.g. docs/health.md, docs/locations.md)
      documenting the method, path, request/response shapes, status codes, and
      any relevant notes.
